{{template "layout" .}}
{{define "title"}}httpmux - {{.Target.Name}} Terminal{{end}}
{{define "head"}}
<link rel="stylesheet" href="/static/vendor/xterm/xterm.css">
<style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1b26; }
    #terminal-container { width: 100%; height: 100vh; }
    .conn-status { position: fixed; top: 8px; right: 8px; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-family: monospace; z-index: 100; }
    .conn-status.connected { background: #1a3a1a; color: #4ade80; }
    .conn-status.disconnected { background: #3a1a1a; color: #f87171; }
</style>
{{end}}
{{define "body"}}
<div id="conn-status" class="conn-status disconnected">connecting...</div>
<div id="terminal-container"></div>
{{end}}
{{define "scripts"}}
<script>window.HTTPMUX_TARGET = "{{.Target.Name}}";</script>
<script src="/static/vendor/xterm/xterm.min.js"></script>
<script src="/static/vendor/xterm/addon-fit.min.js"></script>
<script src="/static/vendor/xterm/addon-web-links.min.js"></script>
<script src="/static/js/terminal.js"></script>
{{end}}
